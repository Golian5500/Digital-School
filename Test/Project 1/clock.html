<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h1 id="time"></h1>
    <script>
        function updateTime() {
            const now = new Date();
            let hours = now.getHours();
            let minutes = now.getMinutes();
            let seconds = now.getSeconds();
            let milis = now.getMilliseconds();
            if (milis < 100) {
                milis = "0" + milis;
            }
            if (seconds < 10) {
                seconds = "0" + seconds;
            }
            if (minutes < 10) {
                minutes = "0" + minutes;
            }
            if (hours < 10) {
                hours = "0" + hours;
            }

            document.getElementById("time").textContent = hours + ":" + minutes + ":" + seconds + ":" + milis;
        }
        setInterval(updateTime, 1);
        updateTime();
    </script>
</body>

</html>
